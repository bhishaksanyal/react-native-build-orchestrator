name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: yarnpkg/action-setup@v4
        with:
          version: latest
      - run: yarn install --frozen-lockfile
      - run: yarn test
      - run: yarn build
