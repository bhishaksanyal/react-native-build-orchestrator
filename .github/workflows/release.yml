name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    # Skip release if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    runs-on: ubuntu-latest

    # 🔐 Least-privilege permissions (Scorecard requirement)
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Setup Yarn (Corepack)
        run: |
          corepack enable
          corepack prepare yarn@3.6.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build package
        run: yarn build

      - name: Run tests
        run: yarn test

      # 📊 Codecov (fail if upload fails)
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      # 🔒 OSSF Scorecard
      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false

      # 📦 Semantic Release (needs elevated perms only here)
      - name: Create Release
        uses: cycjimmy/semantic-release-action@16ca923e6ccbb50770c415a0ccd43709a8c5f7a4
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/commit-analyzer@f106b763d5a1057a18e3457c11d521976d770506
            @semantic-release/release-notes-generator@9728887caf9d7ca03e6861b019785539cbb7857e
            @semantic-release/changelog@47045b310f0550fa4ce278bbfba36e2e155946e2
            @semantic-release/npm@daec492f715f00a6ce61ed1e942d93c735c8fba8
            @semantic-release/git@3e934d45f97fd07a63617c0fc098c9ed3e67d97a
            @semantic-release/github@edd165252bc8ee96de37940f4730fd43f0e67a0f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
