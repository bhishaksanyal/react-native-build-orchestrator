name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    # Skip release if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    runs-on: ubuntu-latest

    # 🔐 Least-privilege permissions (Scorecard requirement)
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Setup Yarn (Corepack)
        run: |
          corepack enable
          corepack prepare yarn@3.6.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build package
        run: yarn build

      - name: Run tests
        run: yarn test

      # 📊 Codecov (fail if upload fails)
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      # 🔒 OSSF Scorecard
      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false

      # 📦 Semantic Release (needs elevated perms only here)
      - name: Create Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/commit-analyzer@11
            @semantic-release/release-notes-generator@13
            @semantic-release/changelog@6
            @semantic-release/npm@12
            @semantic-release/git@10
            @semantic-release/github@10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}